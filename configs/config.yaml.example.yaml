server:
  grpc:
    network: tcp
    addr: "0.0.0.0:9000"
    timeout_seconds: 5
data:
  database:
    driver: mysql
    source: "paigram_hoyo:paigram_hoyo@tcp(127.0.0.1:3306)/platform_mihomo?charset=utf8mb4&parseTime=True&loc=UTC"
  redis:
    addr: "127.0.0.1:6379"
    password: ""
    db: 0
    prefix: "platform-mihomo:"
security:
  # Replace with a real 32-byte secret before running the service.
  credential_encryption_key: 0123456789abcdef0123456789abcdef
  service_ticket_issuer: paigram-account-center
  service_ticket_key_id: account-center-ed25519-key
  service_ticket_public_key_pem: |
    -----BEGIN PUBLIC KEY-----
    MCowBQYDK2VwAyEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    -----END PUBLIC KEY-----
